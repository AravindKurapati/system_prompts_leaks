name: Update Timeline and Deploy

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Sync prompt files from upstream
        run: |
          git remote add upstream https://github.com/asgeirtj/system_prompts_leaks.git || true
          git fetch upstream main || echo "WARNING: Could not reach upstream, running with existing files"
          git checkout upstream/main -- Anthropic/ OpenAI/ Google/ xAI/ || echo "WARNING: Upstream checkout failed, using existing files"

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install groq python-dotenv

      - name: Debug
        run: |
          pwd && ls
          git log --oneline -5 -- Anthropic/claude.html

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python extract_and_analyze.py

      - name: Commit updated timeline
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add enriched_timeline.json
          git diff --staged --quiet || git commit -m "Update timeline $(date +%Y-%m-%d)"
          git push

  deploy:
    needs: pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 1

      - name: Copy JSON to Vite public dir
        run: cp enriched_timeline.json frontend/public/enriched_timeline.json

      - uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
